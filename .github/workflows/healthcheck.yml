name: Healthcheck

on:
  schedule:
    # Every 24 hours
    - cron: '0 */24 * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --save-dev puppeteer nodemailer
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: false

      - name: Run healthcheck
        run: node scripts/healthcheck.js
        env:
          HEALTHCHECK_ALERT_EMAIL: ${{ secrets.HEALTHCHECK_ALERT_EMAIL }}
          HEALTHCHECK_SMTP_USER: ${{ secrets.HEALTHCHECK_SMTP_USER }}
          HEALTHCHECK_SMTP_PASS: ${{ secrets.HEALTHCHECK_SMTP_PASS }}

      - name: Report failure
        if: failure()
        run: |
          echo "Healthcheck failed. Alerts have been sent to $HEALTHCHECK_ALERT_EMAIL"
